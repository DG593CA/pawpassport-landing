kind = "web"
previewPath = "/"
title = "ESA Pet Landing Page"
version = "1.0.0"
id = "artifacts/esapet-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23489

[services.development]
run = "pnpm --filter @workspace/esapet-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/esapet-landing", "run", "build" ]
publicDir = "artifacts/esapet-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23489"
BASE_PATH = "/"
